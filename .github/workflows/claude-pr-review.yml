name: Claude PR Review

# Triggers when a label is added to a PR. The job below only runs when that
# label is "agent-review", so reviews are opt-in: apply the label to hand a PR
# to the agent, then route to a human afterward (see README note below).
on:
  pull_request:
    types: [labeled]

jobs:
  claude-review:
    if: github.event.label.name == 'agent-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the official code-review skill, packaged as a plugin.
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          # Defaults to Sonnet. Swap to "--model claude-opus-4-8" for deeper review.
          claude_args: "--model claude-sonnet-4-6"
